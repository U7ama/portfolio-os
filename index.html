<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="" />
  <base target="_parent">
  <link rel="stylesheet" href="https://use.typekit.net/llo2eru.css" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json" />
  <title>Usama Aslam - OS</title>
  <script>
    window.addEventListener('load', () => {
      const trustedParentOrigins = new Set([
        'https://3d.usamaaslam.site',
      ]);

      const postToTrustedParent = (message) => {
        if (window.parent !== window) {
          trustedParentOrigins.forEach((origin) => {
            window.parent.postMessage(message, origin);
          });
        }
      };

      window.addEventListener('mousemove', (event) => {
        postToTrustedParent({
          clientX: event.clientX,
          clientY: event.clientY,
          type: 'mousemove',
        });
      });
      window.addEventListener('mousedown', () => {
        postToTrustedParent({ type: 'mousedown' });
      });
      window.addEventListener('mouseup', () => {
        postToTrustedParent({ type: 'mouseup' });
      });
      window.addEventListener('keydown', (event) => {
        postToTrustedParent({ type: 'keydown', key: event.key });
      });
      window.addEventListener('keyup', (event) => {
        postToTrustedParent({ type: 'keyup', key: event.key });
      });
    });
  </script>
</head>
